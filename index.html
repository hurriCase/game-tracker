<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Category Tracker</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f4f0; color: #1a1a18; min-height: 100vh; padding: 1.5rem; }
.layout { display: grid; grid-template-columns: 1fr 190px; gap: 14px; max-width: 980px; margin: 0 auto; align-items: start; }
.top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
.top-bar h1 { font-size: 17px; font-weight: 600; }
.top-actions { display: flex; gap: 6px; }
.cats { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 10px; margin-bottom: 12px; }
.cat-card { background: #fff; border: 1px solid #e0dfd8; border-radius: 12px; padding: 10px; }
.cat-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.cat-title { font-size: 11px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; }
.cat-easy .cat-title { color: #3B6D11; }
.cat-medium .cat-title { color: #854F0B; }
.cat-hard .cat-title { color: #A32D2D; }
.cat-badge { font-size: 10px; padding: 1px 6px; border-radius: 99px; }
.cat-easy .cat-badge { background: #EAF3DE; color: #3B6D11; }
.cat-medium .cat-badge { background: #FAEEDA; color: #854F0B; }
.cat-hard .cat-badge { background: #FCEBEB; color: #A32D2D; }
.sel-all-row { display: flex; align-items: center; gap: 6px; padding: 2px 6px 5px; border-bottom: 1px solid #f0efe8; margin-bottom: 4px; }
.sel-all-row label { font-size: 10px; color: #999; cursor: pointer; }
.players-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; margin-bottom: 8px; }
.pr { display: flex; align-items: center; gap: 5px; padding: 3px 6px; border-radius: 6px; cursor: pointer; border: 1px solid transparent; user-select: none; transition: background 0.1s; }
.pr:hover { background: #f5f4f0; }
.cat-easy .pr.sel { background: #EAF3DE; border-color: #97C459; }
.cat-medium .pr.sel { background: #FAEEDA; border-color: #EF9F27; }
.cat-hard .pr.sel { background: #FCEBEB; border-color: #F09595; }
.chk { width: 12px; height: 12px; border: 1px solid #ccc; border-radius: 2px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
.cat-easy .pr.sel .chk { background: #639922; border-color: #639922; }
.cat-medium .pr.sel .chk { background: #BA7517; border-color: #BA7517; }
.cat-hard .pr.sel .chk { background: #E24B4A; border-color: #E24B4A; }
.chk svg { display: none; }
.pr.sel .chk svg { display: block; }
.pname { font-size: 11px; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pscore { font-size: 10px; color: #aaa; }
.cnt-btn { width: 100%; padding: 5px; font-size: 12px; border-radius: 6px; cursor: pointer; border: 1px solid; font-weight: 600; font-family: inherit; transition: background 0.1s; }
.cat-easy .cnt-btn { background: #EAF3DE; border-color: #639922; color: #3B6D11; }
.cat-easy .cnt-btn:hover:not(:disabled) { background: #C0DD97; }
.cat-medium .cnt-btn { background: #FAEEDA; border-color: #BA7517; color: #854F0B; }
.cat-medium .cnt-btn:hover:not(:disabled) { background: #FAC775; }
.cat-hard .cnt-btn { background: #FCEBEB; border-color: #E24B4A; color: #A32D2D; }
.cat-hard .cnt-btn:hover:not(:disabled) { background: #F7C1C1; }
.cnt-btn:disabled { opacity: 0.35; cursor: default; }
.scores-wrap { background: #fff; border: 1px solid #e0dfd8; border-radius: 12px; overflow: hidden; }
.stbl { width: 100%; border-collapse: collapse; font-size: 12px; table-layout: fixed; }
.stbl th { text-align: left; padding: 6px 8px; color: #666; font-weight: 600; border-bottom: 1px solid #e0dfd8; background: #f9f8f4; }
.stbl td { padding: 4px 8px; border-bottom: 1px solid #f0efe8; }
.stbl tr:last-child td { border-bottom: none; }
.stbl td input { width: 42px; font-size: 12px; padding: 1px 3px; border: 1px solid #ddd; border-radius: 3px; text-align: center; font-family: inherit; }
.stbl td input:focus { outline: none; border-color: #aaa; }
.ref-card { background: #fff; border: 1px solid #e0dfd8; border-radius: 12px; padding: 12px; position: sticky; top: 16px; }
.ref-title { font-size: 10px; font-weight: 600; color: #999; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.06em; }
.ref-section { margin-bottom: 10px; }
.ref-section:last-child { margin-bottom: 0; }
.ref-label { font-size: 10px; font-weight: 600; margin-bottom: 4px; padding: 2px 7px; border-radius: 4px; display: inline-block; }
.ref-hard .ref-label { background: #FCEBEB; color: #A32D2D; }
.ref-medium .ref-label { background: #FAEEDA; color: #854F0B; }
.ref-easy .ref-label { background: #EAF3DE; color: #3B6D11; }
.ref-list { list-style: none; }
.ref-list li { font-size: 11px; color: #555; padding: 1px 0; line-height: 1.5; }
.ref-list li::before { content: "·"; margin-right: 5px; color: #bbb; }
.act-btn { font-size: 11px; padding: 4px 10px; border-radius: 6px; cursor: pointer; border: 1px solid #ccc; background: #fff; color: #555; font-family: inherit; transition: background 0.1s; }
.act-btn:hover { background: #f5f4f0; }
.act-btn.danger { color: #A32D2D; border-color: #F09595; }
.act-btn.danger:hover { background: #FCEBEB; }
.toast { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); background: #1a1a18; color: #fff; border-radius: 8px; padding: 7px 16px; font-size: 12px; opacity: 0; transition: opacity 0.25s; pointer-events: none; white-space: nowrap; }
.toast.show { opacity: 1; }
@media (max-width: 640px) { .layout { grid-template-columns: 1fr; } .cats { grid-template-columns: 1fr; } .ref-card { position: static; } }
</style>
</head>
<body>
<div class="layout">
  <div class="main">
    <div class="top-bar">
      <h1>Game Category Tracker</h1>
      <div class="top-actions">
        <button class="act-btn" onclick="exportData()">Export .txt</button>
        <button class="act-btn danger" onclick="resetAll()">Reset all</button>
      </div>
    </div>
    <div class="cats">
      <div class="cat-card cat-easy" id="cat-easy"></div>
      <div class="cat-card cat-medium" id="cat-medium"></div>
      <div class="cat-card cat-hard" id="cat-hard"></div>
    </div>
    <div class="scores-wrap">
      <table class="stbl" id="stbl"></table>
    </div>
  </div>

  <div class="ref-card">
    <div class="ref-title">Boss reference</div>
    <div class="ref-section ref-hard">
      <span class="ref-label">Hard</span>
      <ul class="ref-list">
        <li>Кабрио</li>
        <li>Глаки</li>
        <li>Зерколо</li>
        <li>Фолинт</li>
        <li>Андрас</li>
      </ul>
    </div>
    <div class="ref-section ref-medium">
      <span class="ref-label">Medium</span>
      <ul class="ref-list">
        <li>Самуэль</li>
        <li>Тиминиэль</li>
        <li>Ландор</li>
        <li>Хисилром</li>
        <li>Бист</li>
      </ul>
    </div>
    <div class="ref-section ref-easy">
      <span class="ref-label">Easy</span>
      <ul class="ref-list">
        <li>Остальные боссы</li>
      </ul>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const PLAYERS = ['B1gP1g','Ez7','UZB','XL','MiniPig','linhnhi','oOoKeyoOo','jpfuji','IceWater','SayLove','2022','SayYes','Расули','Only'];
const CATS = [{key:'easy',label:'Easy'},{key:'medium',label:'Medium'},{key:'hard',label:'Hard'}];
const SK = 'gct_scores_v2';
let scores = {};
let sel = {easy:new Set(),medium:new Set(),hard:new Set()};

function load() {
  try { const s = localStorage.getItem(SK); if (s) scores = JSON.parse(s); } catch(e) {}
  PLAYERS.forEach(p => {
    if (!scores[p]) scores[p] = {easy:0,medium:0,hard:0};
    CATS.forEach(c => { if (scores[p][c.key] == null) scores[p][c.key] = 0; });
  });
}

function save() { try { localStorage.setItem(SK, JSON.stringify(scores)); } catch(e) {} }

function renderCats() {
  CATS.forEach(cat => {
    const el = document.getElementById('cat-' + cat.key);
    const n = sel[cat.key].size;
    el.innerHTML = `
      <div class="cat-hdr">
        <span class="cat-title">${cat.label}</span>
        <span class="cat-badge">${n} sel</span>
      </div>
      <div class="sel-all-row">
        <input type="checkbox" id="all-${cat.key}" onchange="toggleAll('${cat.key}',this.checked)">
        <label for="all-${cat.key}">Select all</label>
      </div>
      <div class="players-grid">
        ${PLAYERS.map(p => `
          <div class="pr ${sel[cat.key].has(p)?'sel':''}" onclick="toggleP('${cat.key}','${p}')">
            <div class="chk"><svg width="8" height="6" viewBox="0 0 8 6" fill="none"><path d="M1 3L3 5L7 1" stroke="white" stroke-width="1.3" stroke-linecap="round"/></svg></div>
            <span class="pname">${p}</span>
            <span class="pscore">${scores[p][cat.key]}</span>
          </div>`).join('')}
      </div>
      <button class="cnt-btn" onclick="countCat('${cat.key}')" ${n===0?'disabled':''}>Count${n>0?' ('+n+')':''}</button>`;
    const a = document.getElementById('all-'+cat.key);
    if (a) a.checked = n === PLAYERS.length;
  });
}

function renderTable() {
  const sorted = [...PLAYERS].sort((a,b) => {
    return (scores[b].easy+scores[b].medium+scores[b].hard) - (scores[a].easy+scores[a].medium+scores[a].hard);
  });
  document.getElementById('stbl').innerHTML = `
    <thead><tr>
      <th style="width:34%">Player</th>
      <th style="width:16%">Easy</th>
      <th style="width:16%">Medium</th>
      <th style="width:16%">Hard</th>
      <th style="width:18%">Total</th>
    </tr></thead>
    <tbody>${sorted.map(p => {
      const e=scores[p].easy,m=scores[p].medium,h=scores[p].hard;
      return `<tr>
        <td><strong>${p}</strong></td>
        <td><input type="number" min="0" value="${e}" onchange="edit('${p}','easy',this.value)"></td>
        <td><input type="number" min="0" value="${m}" onchange="edit('${p}','medium',this.value)"></td>
        <td><input type="number" min="0" value="${h}" onchange="edit('${p}','hard',this.value)"></td>
        <td><strong>${e+m+h}</strong></td>
      </tr>`;
    }).join('')}</tbody>`;
}

function toggleP(cat, player) {
  sel[cat].has(player) ? sel[cat].delete(player) : sel[cat].add(player);
  renderCats();
}

function toggleAll(cat, checked) {
  if (checked) PLAYERS.forEach(p => sel[cat].add(p));
  else sel[cat].clear();
  renderCats();
}

function countCat(cat) {
  if (!sel[cat].size) return;
  sel[cat].forEach(p => scores[p][cat]++);
  sel[cat].clear();
  save(); renderCats(); renderTable();
  showToast('Counted!');
}

function edit(player, cat, val) {
  scores[player][cat] = Math.max(0, parseInt(val)||0);
  save(); renderCats(); renderTable();
}

function exportData() {
  const sorted = [...PLAYERS].sort((a,b) => (scores[b].easy+scores[b].medium+scores[b].hard)-(scores[a].easy+scores[a].medium+scores[a].hard));
  const lines = ['Game Category Tracker', new Date().toLocaleString(), '', 'Player'.padEnd(14)+'Easy'.padEnd(8)+'Medium'.padEnd(10)+'Hard'.padEnd(8)+'Total', '-'.repeat(44)];
  sorted.forEach(p => { const e=scores[p].easy,m=scores[p].medium,h=scores[p].hard; lines.push(p.padEnd(14)+String(e).padEnd(8)+String(m).padEnd(10)+String(h).padEnd(8)+(e+m+h)); });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([lines.join('\n')], {type:'text/plain'}));
  a.download = 'scores.txt'; a.click();
}

function resetAll() {
  if (!confirm('Reset ALL scores to zero?')) return;
  PLAYERS.forEach(p => scores[p] = {easy:0,medium:0,hard:0});
  sel = {easy:new Set(),medium:new Set(),hard:new Set()};
  save(); renderCats(); renderTable();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1600);
}

load(); renderCats(); renderTable();
</script>
</body>
</html>
